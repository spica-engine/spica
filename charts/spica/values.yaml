# Default values for spica.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
database:
  replicas: 1
  replicaSetName: 'rs0'
  name: spica
  version: '8.0.4'
  storageSize: 2Gi
  storageClass:
  resources: {}
  replicationControllerImage:
  spicaUsername:
  spicaPassword:
  rootUsername:
  rootPassword:
  replicaAuthKey:
  logLevel: 0
  profilingLevel: 1
  profilingSlowms: 100
  # probes
  # startup
  startupProbeInitialDelaySeconds: 
  startupProbePeriodSeconds: 
  startupProbeTimeoutSeconds: 
  # liveness
  livenessProbePeriodSeconds: 
  livenessProbeTimeoutSeconds: 
  livenessProbeFailureThreshold: 
  livenessProbeSuccessThreshold: 
  # readiness
  readinessProbePeriodSeconds: 
  readinessProbeTimeoutSeconds: 
  readinessProbeFailureThreshold: 
  readinessProbeSuccessThreshold: 

images:
  api: spicaengine/api
  web: spicaengine/spica
  replicationcontroller: spicaengine/mongoreplicationcontroller
  migrate: spicaengine/migrate

application:
  replicas: 1
  secret:
  bucketDataHashSecret:
  bucketDataEncryptionSecret:
  twilioAccountSid:
  twilioAuthToken:
  twilioFromNumber:
  userVerificationHashSecret:
  userProviderEncryptionSecret:
  userProviderHashSecret:
  defaultPassword: spica
  webBaseUrl: /spica/
  apiBaseUrl: /api/
  publicHost:
  storageSize: 2Gi
  storageClass:
  apiResources: {}
  webResources: {}
  args: []
  diskAccessMode: ReadWriteOnce
  serviceAccountName: default
  # probes
  # startup
  apiStartupProbeInitialDelaySeconds: 
  apiStartupProbePeriodSeconds: 
  apiStartupProbeTimeoutSeconds: 
  # liveness
  apiLivenessProbePeriodSeconds: 
  apiLivenessProbeTimeoutSeconds: 
  apiLivenessProbeFailureThreshold: 
  apiLivenessProbeSuccessThreshold: 
  # readiness
  apiReadinessProbePeriodSeconds: 
  apiReadinessProbeTimeoutSeconds: 
  apiReadinessProbeFailureThreshold: 
  apiReadinessProbeSuccessThreshold: 
ingress:
  hosts: []
  tls: []
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 15M
    nginx.ingress.kubernetes.io/client-body-buffer-size: 15Mb
    nginx.ingress.kubernetes.io/rewrite-target: /$1
