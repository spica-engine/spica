apiVersion: v1
kind: Secret
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-application-secrets
  annotations:
    "helm.sh/hook": pre-install, pre-upgrade
    "helm.sh/hook-weight": "-1"
type: Opaque
{{- /* --- Resolve new values from .Values --- */}}
{{- $masterKeyNew    := .Values.application.masterKey | default "" }}
{{- $secretNew       := .Values.application.secret | default "" }}
{{- $bucketHashNew   := .Values.application.bucketDataHashSecret | default "" }}
{{- $bucketEncNew    := .Values.application.bucketDataEncryptionSecret | default "" }}
{{- $secretModEncNew := .Values.application.secretModuleEncryptionSecret | default "" }}
{{- $userVerifNew    := .Values.application.userVerificationHashSecret | default "" }}
{{- $userProvEncNew  := .Values.application.userProviderEncryptionSecret | default "" }}
{{- $userProvHashNew := .Values.application.userProviderHashSecret | default "" }}
{{- $refreshTokenHashNew := .Values.application.refreshTokenHashSecret | default "" }}
{{- /* --- Look up existing cluster secret (single call) --- */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-application-secrets" .Release.Name) }}
{{- /* --- Determine presence: true when supplied in values OR already in cluster --- */}}
{{- $hasMasterKey    := or (ne $masterKeyNew "")    (and $existing.data (ne ($existing.data.masterKey | default "") "")) }}
{{- $hasSecret       := or (ne $secretNew "")       (and $existing.data (ne ($existing.data.secret | default "") "")) }}
{{- $hasBucketHash   := or (ne $bucketHashNew "")   (and $existing.data (ne ($existing.data.bucketDataHashSecret | default "") "")) }}
{{- $hasBucketEnc    := or (ne $bucketEncNew "")    (and $existing.data (ne ($existing.data.bucketDataEncryptionSecret | default "") "")) }}
{{- $hasSecretModEnc := or (ne $secretModEncNew "") (and $existing.data (ne ($existing.data.secretModuleEncryptionSecret | default "") "")) }}
{{- $hasUserVerif    := or (ne $userVerifNew "")    (and $existing.data (ne ($existing.data.userVerificationHashSecret | default "") "")) }}
{{- $hasUserProvEnc  := or (ne $userProvEncNew "")  (and $existing.data (ne ($existing.data.userProviderEncryptionSecret | default "") "")) }}
{{- $hasUserProvHash := or (ne $userProvHashNew "")  (and $existing.data (ne ($existing.data.userProviderHashSecret | default "") "")) }}
{{- $hasRefreshTokenHash := or (ne $refreshTokenHashNew "") (and $existing.data (ne ($existing.data.refreshTokenHashSecret | default "") "")) }}
{{- /* --- Validate: masterKey is optional only when ALL individual secrets are present; --- */}}
{{- /* --- otherwise every missing secret is reported individually.                     --- */}}
{{- if not $hasMasterKey }}
  {{- if not $hasSecret       }}{{- fail "masterKey is absent: .Values.application.secret is required" }}{{- end }}
  {{- if not $hasBucketHash   }}{{- fail "masterKey is absent: .Values.application.bucketDataHashSecret is required" }}{{- end }}
  {{- if not $hasBucketEnc    }}{{- fail "masterKey is absent: .Values.application.bucketDataEncryptionSecret is required" }}{{- end }}
  {{- if not $hasSecretModEnc }}{{- fail "masterKey is absent: .Values.application.secretModuleEncryptionSecret is required" }}{{- end }}
  {{- if not $hasUserVerif    }}{{- fail "masterKey is absent: .Values.application.userVerificationHashSecret is required" }}{{- end }}
  {{- if not $hasUserProvEnc  }}{{- fail "masterKey is absent: .Values.application.userProviderEncryptionSecret is required" }}{{- end }}
  {{- if not $hasUserProvHash }}{{- fail "masterKey is absent: .Values.application.userProviderHashSecret is required" }}{{- end }}
  {{- if not $hasRefreshTokenHash }}{{- fail "masterKey is absent: .Values.application.refreshTokenHashSecret is required" }}{{- end }}
{{- end }}
data:
  masterKey: |
    {{- if $masterKeyNew }}
      {{ $masterKeyNew | b64enc }}
    {{- else if and $existing.data $existing.data.masterKey }}
      {{ $existing.data.masterKey }}
    {{- else }}
      {{ "" | b64enc }}
    {{- end }}
  secret: |
    {{- if $secretNew }}
      {{ $secretNew | b64enc }}
    {{- else if and $existing.data $existing.data.secret }}
      {{ $existing.data.secret }}
    {{- else }}
      {{ "" | b64enc }}
    {{- end }}

  bucketDataHashSecret: |
    {{- if $bucketHashNew }}
      {{ $bucketHashNew | b64enc }}
    {{- else if and $existing.data $existing.data.bucketDataHashSecret }}
      {{ $existing.data.bucketDataHashSecret }}
    {{- else }}
      {{ "" | b64enc }}
    {{- end }}
  bucketDataEncryptionSecret: |
    {{- if $bucketEncNew }}
      {{ $bucketEncNew | b64enc }}
    {{- else if and $existing.data $existing.data.bucketDataEncryptionSecret }}
      {{ $existing.data.bucketDataEncryptionSecret }}
    {{- else }}
      {{ "" | b64enc }}
    {{- end }}

  secretModuleEncryptionSecret: |
    {{- if $secretModEncNew }}
      {{ $secretModEncNew | b64enc }}
    {{- else if and $existing.data $existing.data.secretModuleEncryptionSecret }}
      {{ $existing.data.secretModuleEncryptionSecret }}
    {{- else }}
      {{ "" | b64enc }}
    {{- end }}

  userVerificationHashSecret: |
    {{- if $userVerifNew }}
      {{ $userVerifNew | b64enc }}
    {{- else if and $existing.data $existing.data.userVerificationHashSecret }}
      {{ $existing.data.userVerificationHashSecret }}
    {{- else }}
      {{ "" | b64enc }}
    {{- end }}

  userProviderEncryptionSecret: |
    {{- if $userProvEncNew }}
      {{ $userProvEncNew | b64enc }}
    {{- else if and $existing.data $existing.data.userProviderEncryptionSecret }}
      {{ $existing.data.userProviderEncryptionSecret }}
    {{- else }}
      {{ "" | b64enc }}
    {{- end }}

  userProviderHashSecret: |
    {{- if $userProvHashNew }}
      {{ $userProvHashNew | b64enc }}
    {{- else if and $existing.data $existing.data.userProviderHashSecret }}
      {{ $existing.data.userProviderHashSecret }}
    {{- else }}
      {{ "" | b64enc }}
    {{- end }}

  refreshTokenHashSecret: |
    {{- if $refreshTokenHashNew }}
      {{ $refreshTokenHashNew | b64enc }}
    {{- else if and $existing.data $existing.data.refreshTokenHashSecret }}
      {{ $existing.data.refreshTokenHashSecret }}
    {{- else }}
      {{ "" | b64enc }}
    {{- end }}

  twilioAccountSid: |
    {{- $value := .Values.application.twilioAccountSid | default "" }}
    {{- if $value }}
      {{ $value | b64enc }}
    {{- else if and $existing.data $existing.data.twilioAccountSid }}
      {{ $existing.data.twilioAccountSid }}
    {{- else }}
      {{ "" | b64enc }}
    {{- end }}

  twilioAuthToken: |
    {{- $value := .Values.application.twilioAuthToken | default "" }}
    {{- if $value }}
      {{ $value | b64enc }}
    {{- else if and $existing.data $existing.data.twilioAuthToken }}
      {{ $existing.data.twilioAuthToken }}
    {{- else }}
      {{ "" | b64enc }}
    {{- end }}

  twilioFromNumber: |
    {{- $value := .Values.application.twilioFromNumber | default "" }}
    {{- if $value }}
      {{ $value | b64enc }}
    {{- else if and $existing.data $existing.data.twilioFromNumber }}
      {{ $existing.data.twilioFromNumber }}
    {{- else }}
      {{ "" | b64enc }}
    {{- end }}
