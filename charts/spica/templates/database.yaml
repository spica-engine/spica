apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: {{.Release.Namespace}}
  name: {{ .Release.Name }}-database
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-database
    app.kubernetes.io/component: database
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: helm
spec:
  serviceName: {{ .Release.Name }}-database
  replicas: {{ .Values.database.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}-database
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}-database
        app.kubernetes.io/component: database
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/version: {{ .Chart.AppVersion }}
        app.kubernetes.io/part-of: {{ .Chart.Name }}
        app.kubernetes.io/managed-by: helm
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/databasesecrets.yaml") . | sha256sum }}
        checksum/initdb: {{ include (print $.Template.BasePath "/initdb.yaml") . | sha256sum }}
    spec:
      volumes:
      - name: init-db
        configMap:
          name: {{ .Release.Name }}-database
          defaultMode: 0755
      - name: db-replica-auth-key
        secret:
          secretName: {{ .Release.Name }}-database-replica-auth-key
          defaultMode: 0400
      initContainers:
        - name: init-users
          image: mongo:{{ .Values.database.version }}
          command:
            - "/bin/sh"
            - "-c"
            - |
              if [ "$(hostname)" = "{{ .Release.Name }}-database-0" ]; then
                ./scripts/init-users.sh > ./init-users.log
              else
                echo "Skipping init-users on this pod"
              fi
          volumeMounts:
            - name: {{ .Release.Name }}-data
              mountPath: /data/db
            - name: init-db
              mountPath: /scripts
          env:
            - name: SPICA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-database-spica-credentials
                  key: spicaUsername
            - name: SPICA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-database-spica-credentials
                  key: spicaPassword
            - name: ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-database-root-credentials
                  key: rootUsername
            - name: ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-database-root-credentials
                  key: rootPassword
      containers:
        - name: mongo
          image: mongo:{{ .Values.database.version }}
          command:
            - "/bin/sh"
            - "-c"
          args: 
            - |
              rm -f /data/db/mongod.lock /data/db/WiredTiger.lock
              exec mongod --replSet rs0 --bind_ip_all --auth --keyFile ./etc/secrets/replicaAuthKey --setParameter logLevel={{ .Values.database.logLevel }}
          ports:
            - containerPort: 27017
          startupProbe:
            exec:
              command:
                - mongosh
                - --username
                - $(ROOT_USERNAME)
                - --password
                - $(ROOT_PASSWORD)
                - --authenticationDatabase
                - admin
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: {{ .Values.database.startupProbeInitialDelaySeconds }}
            periodSeconds: {{ .Values.database.startupProbePeriodSeconds }}
            timeoutSeconds: {{ .Values.database.startupProbeTimeoutSeconds }}
            failureThreshold: {{ .Values.database.startupProbeFailureThreshold }}
          livenessProbe:
            # TCP probe instead of an exec'd mongosh: mongo-8 images ship only mongosh (a Node.js
            # process), so an exec liveness check spawned a full mongosh + pooled SCRAM auths every
            # period — heavy, traffic-independent CPU and connection-churn logs on every instance.
            # mongod runs with --bind_ip_all on 27017, so a TCP connect succeeds iff it's accepting
            # connections; a hung-but-listening mongod is rare and an aggressive liveness restart of
            # a database is itself risky, so TCP is the safer default here.
            tcpSocket:
              port: 27017
            periodSeconds: {{ .Values.database.livenessProbePeriodSeconds }}
            timeoutSeconds: {{ .Values.database.livenessProbeTimeoutSeconds }}
            failureThreshold: {{ .Values.database.livenessProbeFailureThreshold }}
          readinessProbe:
            # TCP probe (see livenessProbe note). The startupProbe below keeps a real mongosh ping,
            # so the pod is only marked "started" once mongo actually answers a command; after that,
            # readiness just needs to confirm the listener is up — no recurring mongosh spawns.
            tcpSocket:
              port: 27017
            periodSeconds: {{ .Values.database.readinessProbePeriodSeconds }}
            timeoutSeconds: {{ .Values.database.readinessProbeTimeoutSeconds }}
            failureThreshold: {{ .Values.database.readinessProbeFailureThreshold }}
          lifecycle:
            postStart:
              exec:
                command:
                  - "/bin/sh"
                  - "-c"
                  - |
                    ./scripts/set-profiling-level.sh > ./set-profiling-level.log
          resources:
{{ toYaml .Values.database.resources | indent 12 }}
          volumeMounts:
            - name: {{ .Release.Name }}-data
              mountPath: /data/db
            - name: init-db
              mountPath: /scripts
            - name: db-replica-auth-key
              mountPath: /etc/secrets
          env:
            - name: ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-database-root-credentials
                  key: rootUsername
            - name: ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-database-root-credentials
                  key: rootPassword
            - name: DATABASE_NAME
              value: {{ .Values.database.name }}
            - name: PROFILING_LEVEL
              value: "{{ .Values.database.profilingLevel }}"
            - name: PROFILING_SLOWMS
              value: "{{ .Values.database.profilingSlowms }}"
            {{- if eq (int .Values.database.replicas) 1}}
            - name: RS_MEMBERS
              value: '{{ template "generateReplicaSetMembers" . }}'
            {{- end}}      
      terminationGracePeriodSeconds: {{ .Values.database.terminationGracePeriodSeconds }}
      {{- if .Values.database.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.database.nodeSelector | indent 8 }}
      {{- end }}
      {{- if .Values.database.tolerations }}
      tolerations:
{{ toYaml .Values.database.tolerations | indent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: {{ .Release.Name }}-data
      spec:
        storageClassName: {{.Values.database.storageClass}}
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{.Values.database.storageSize}}
