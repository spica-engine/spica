# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: application secrets
templates:
  - templates/applicationsecrets.yaml
release:
  name: release-name
  namespace: default
set:
  application.secret: test-secret
  application.masterKey: test-master-key
  application.publicHost: https://test.example.com

tests:
  - it: should render a single Secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret

  - it: should be named after the release
    asserts:
      - equal:
          path: metadata.name
          value: release-name-application-secrets

  - it: should carry pre-install and pre-upgrade hook annotations
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-install, pre-upgrade"
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-1"

  - it: should be of type Opaque
    asserts:
      - equal:
          path: type
          value: Opaque

  - it: should have non-empty data for all required secret keys when values are provided
    asserts:
      - isNotEmpty:
          path: data.secret
      - isNotEmpty:
          path: data.masterKey

  - it: should have Twilio fields present in data
    asserts:
      - isNotNull:
          path: data.twilioAccountSid
      - isNotNull:
          path: data.twilioAuthToken
      - isNotNull:
          path: data.twilioFromNumber

  - it: should encode Twilio fields even when not provided
    set:
      application.twilioAccountSid: ""
      application.twilioAuthToken: ""
      application.twilioFromNumber: ""
    asserts:
      - isNotNull:
          path: data.twilioAccountSid

  - it: should succeed with masterKey alone and no individual secrets provided
    set:
      application.masterKey: test-master-key
      application.secret: ""
      application.bucketDataHashSecret: ""
      application.bucketDataEncryptionSecret: ""
      application.secretModuleEncryptionSecret: ""
      application.userVerificationHashSecret: ""
      application.userProviderEncryptionSecret: ""
      application.userProviderHashSecret: ""
      application.refreshTokenHashSecret: ""
    asserts:
      - hasDocuments:
          count: 1
      - isNotEmpty:
          path: data.masterKey

  - it: should succeed when all individual secrets are provided without masterKey
    set:
      application.masterKey: ""
      application.secret: my-secret
      application.bucketDataHashSecret: my-bucket-hash
      application.bucketDataEncryptionSecret: my-bucket-enc
      application.secretModuleEncryptionSecret: my-secret-mod-enc
      application.userVerificationHashSecret: my-user-verif
      application.userProviderEncryptionSecret: my-user-prov-enc
      application.userProviderHashSecret: my-user-prov-hash
      application.refreshTokenHashSecret: my-refresh-token-hash
    asserts:
      - hasDocuments:
          count: 1
      - isNotEmpty:
          path: data.secret
      - isNotEmpty:
          path: data.bucketDataHashSecret
      - isNotEmpty:
          path: data.bucketDataEncryptionSecret
      - isNotEmpty:
          path: data.secretModuleEncryptionSecret
      - isNotEmpty:
          path: data.userVerificationHashSecret
      - isNotEmpty:
          path: data.userProviderEncryptionSecret
      - isNotEmpty:
          path: data.userProviderHashSecret
      - isNotEmpty:
          path: data.refreshTokenHashSecret

  - it: should store individually provided secrets alongside masterKey
    set:
      application.masterKey: test-master-key
      application.bucketDataHashSecret: override-hash
    asserts:
      - hasDocuments:
          count: 1
      - isNotEmpty:
          path: data.masterKey
      - isNotEmpty:
          path: data.bucketDataHashSecret

  - it: should fail when masterKey is absent and secret is not provided
    set:
      application.masterKey: ""
      application.secret: ""
      application.bucketDataHashSecret: ""
      application.bucketDataEncryptionSecret: ""
      application.secretModuleEncryptionSecret: ""
      application.userVerificationHashSecret: ""
      application.userProviderEncryptionSecret: ""
      application.userProviderHashSecret: ""
      application.refreshTokenHashSecret: ""
    asserts:
      - failedTemplate:
          errorMessage: "masterKey is absent: .Values.application.secret is required"

  - it: should fail when masterKey is absent and bucketDataHashSecret is not provided
    set:
      application.masterKey: ""
      application.secret: my-secret
      application.bucketDataHashSecret: ""
      application.bucketDataEncryptionSecret: ""
      application.secretModuleEncryptionSecret: ""
      application.userVerificationHashSecret: ""
      application.userProviderEncryptionSecret: ""
      application.userProviderHashSecret: ""
      application.refreshTokenHashSecret: ""
    asserts:
      - failedTemplate:
          errorMessage: "masterKey is absent: .Values.application.bucketDataHashSecret is required"

  - it: should fail when masterKey is absent and bucketDataEncryptionSecret is not provided
    set:
      application.masterKey: ""
      application.secret: my-secret
      application.bucketDataHashSecret: my-bucket-hash
      application.bucketDataEncryptionSecret: ""
      application.secretModuleEncryptionSecret: ""
      application.userVerificationHashSecret: ""
      application.userProviderEncryptionSecret: ""
      application.userProviderHashSecret: ""
      application.refreshTokenHashSecret: ""
    asserts:
      - failedTemplate:
          errorMessage: "masterKey is absent: .Values.application.bucketDataEncryptionSecret is required"

  - it: should fail when masterKey is absent and secretModuleEncryptionSecret is not provided
    set:
      application.masterKey: ""
      application.secret: my-secret
      application.bucketDataHashSecret: my-bucket-hash
      application.bucketDataEncryptionSecret: my-bucket-enc
      application.secretModuleEncryptionSecret: ""
      application.userVerificationHashSecret: ""
      application.userProviderEncryptionSecret: ""
      application.userProviderHashSecret: ""
      application.refreshTokenHashSecret: ""
    asserts:
      - failedTemplate:
          errorMessage: "masterKey is absent: .Values.application.secretModuleEncryptionSecret is required"

  - it: should fail when masterKey is absent and userVerificationHashSecret is not provided
    set:
      application.masterKey: ""
      application.secret: my-secret
      application.bucketDataHashSecret: my-bucket-hash
      application.bucketDataEncryptionSecret: my-bucket-enc
      application.secretModuleEncryptionSecret: my-secret-mod-enc
      application.userVerificationHashSecret: ""
      application.userProviderEncryptionSecret: ""
      application.userProviderHashSecret: ""
      application.refreshTokenHashSecret: ""
    asserts:
      - failedTemplate:
          errorMessage: "masterKey is absent: .Values.application.userVerificationHashSecret is required"

  - it: should fail when masterKey is absent and userProviderEncryptionSecret is not provided
    set:
      application.masterKey: ""
      application.secret: my-secret
      application.bucketDataHashSecret: my-bucket-hash
      application.bucketDataEncryptionSecret: my-bucket-enc
      application.secretModuleEncryptionSecret: my-secret-mod-enc
      application.userVerificationHashSecret: my-user-verif
      application.userProviderEncryptionSecret: ""
      application.userProviderHashSecret: ""
      application.refreshTokenHashSecret: ""
    asserts:
      - failedTemplate:
          errorMessage: "masterKey is absent: .Values.application.userProviderEncryptionSecret is required"

  - it: should fail when masterKey is absent and userProviderHashSecret is not provided
    set:
      application.masterKey: ""
      application.secret: my-secret
      application.bucketDataHashSecret: my-bucket-hash
      application.bucketDataEncryptionSecret: my-bucket-enc
      application.secretModuleEncryptionSecret: my-secret-mod-enc
      application.userVerificationHashSecret: my-user-verif
      application.userProviderEncryptionSecret: my-user-prov-enc
      application.userProviderHashSecret: ""
      application.refreshTokenHashSecret: ""
    asserts:
      - failedTemplate:
          errorMessage: "masterKey is absent: .Values.application.userProviderHashSecret is required"

  - it: should fail when masterKey is absent and refreshTokenHashSecret is not provided
    set:
      application.masterKey: ""
      application.secret: my-secret
      application.bucketDataHashSecret: my-bucket-hash
      application.bucketDataEncryptionSecret: my-bucket-enc
      application.secretModuleEncryptionSecret: my-secret-mod-enc
      application.userVerificationHashSecret: my-user-verif
      application.userProviderEncryptionSecret: my-user-prov-enc
      application.userProviderHashSecret: "my-user-prov-hash"
      application.refreshTokenHashSecret: ""
    asserts:
      - failedTemplate:
          errorMessage: "masterKey is absent: .Values.application.refreshTokenHashSecret is required"
