# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: database secrets
templates:
  - templates/databasesecrets.yaml
release:
  name: release-name
  namespace: default
set:
  application.secret: test-secret
  application.bucketDataHashSecret: test-hash
  application.bucketDataEncryptionSecret: test-enc
  application.userVerificationHashSecret: test-verify
  application.userProviderEncryptionSecret: test-prov-enc
  application.userProviderHashSecret: test-prov-hash
  application.publicHost: https://test.example.com

tests:
  - it: should render exactly 3 Secret documents
    asserts:
      - hasDocuments:
          count: 3

  - it: should render the spica-credentials Secret as the first document
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: release-name-database-spica-credentials

  - it: should render the root-credentials Secret as the second document
    documentIndex: 1
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: release-name-database-root-credentials

  - it: should render the replica-auth-key Secret as the third document
    documentIndex: 2
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: release-name-database-replica-auth-key

  - it: all Secrets should carry pre-install and pre-upgrade hook annotations with weight -1
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-install, pre-upgrade"
        documentIndex: 0
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-1"
        documentIndex: 0
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-install, pre-upgrade"
        documentIndex: 1
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-install, pre-upgrade"
        documentIndex: 2

  - it: all Secrets should be of type Opaque
    asserts:
      - equal:
          path: type
          value: Opaque
        documentIndex: 0
      - equal:
          path: type
          value: Opaque
        documentIndex: 1
      - equal:
          path: type
          value: Opaque
        documentIndex: 2

  - it: spica-credentials should have spicaUsername and spicaPassword keys
    documentIndex: 0
    asserts:
      - isNotNull:
          path: data.spicaUsername
      - isNotNull:
          path: data.spicaPassword

  - it: root-credentials should have rootUsername and rootPassword keys
    documentIndex: 1
    asserts:
      - isNotNull:
          path: data.rootUsername
      - isNotNull:
          path: data.rootPassword

  - it: replica-auth-key should have replicaAuthKey
    documentIndex: 2
    asserts:
      - isNotNull:
          path: data.replicaAuthKey

  - it: should reflect provided spicaUsername value
    set:
      database.spicaUsername: myuser
    documentIndex: 0
    asserts:
      - isNotEmpty:
          path: data.spicaUsername

  - it: should reflect provided rootPassword value
    set:
      database.rootPassword: myrootpass
    documentIndex: 1
    asserts:
      - isNotEmpty:
          path: data.rootPassword

  - it: should reflect provided replicaAuthKey value
    set:
      database.replicaAuthKey: my-replica-key
    documentIndex: 2
    asserts:
      - isNotEmpty:
          path: data.replicaAuthKey
