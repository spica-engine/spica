# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: database headless service
templates:
  - templates/databasesrv.yaml
release:
  name: release-name
  namespace: default
set:
  application.secret: test-secret
  application.bucketDataHashSecret: test-hash
  application.bucketDataEncryptionSecret: test-enc
  application.userVerificationHashSecret: test-verify
  application.userProviderEncryptionSecret: test-prov-enc
  application.userProviderHashSecret: test-prov-hash
  application.publicHost: https://test.example.com

tests:
  - it: should render a single Service
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service

  - it: should be named after the release
    asserts:
      - equal:
          path: metadata.name
          value: release-name-database

  - it: should be a headless service (clusterIP None)
    asserts:
      - equal:
          path: spec.clusterIP
          value: None

  - it: should have publishNotReadyAddresses set to true
    asserts:
      - equal:
          path: spec.publishNotReadyAddresses
          value: true

  - it: should expose MongoDB on port 27017
    asserts:
      - contains:
          path: spec.ports
          content:
            port: 27017
            targetPort: 27017

  - it: should select the correct database pods
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: release-name-database
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: database

  - it: should carry standard Kubernetes labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: service
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: helm
