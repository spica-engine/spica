# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: database replication controller
templates:
  - templates/databasereplication.yaml
release:
  name: release-name
  namespace: default
set:
  application.secret: test-secret
  application.masterKey: test-master-key
  application.publicHost: https://test.example.com

tests:
  - it: should render nothing when database.replicas is 1 (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: should render a Job when database.replicas is greater than 1
    set:
      database.replicas: 3
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Job

  - it: should be named after the release
    set:
      database.replicas: 3
    asserts:
      - equal:
          path: metadata.name
          value: release-name-replication-controller

  - it: should carry post-install and post-upgrade hook annotations
    set:
      database.replicas: 3
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: post-install,post-upgrade

  - it: should have backoffLimit of 3
    set:
      database.replicas: 3
    asserts:
      - equal:
          path: spec.backoffLimit
          value: 3

  - it: should set fixed resource requests and limits on the container
    set:
      database.replicas: 3
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 64Mi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 128Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 200m

  - it: should include node FQDNs for all replicas in the container args
    set:
      database.replicas: 3
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "release-name-database-0.release-name-database.default.svc.cluster.local"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "release-name-database-1.release-name-database.default.svc.cluster.local"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "release-name-database-2.release-name-database.default.svc.cluster.local"

  - it: should use OnFailure restart policy
    set:
      database.replicas: 3
    asserts:
      - equal:
          path: spec.template.spec.restartPolicy
          value: OnFailure

  - it: should apply database nodeSelector to the replication job when set
    set:
      database.replicas: 3
      database.nodeSelector:
        disktype: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: should render a Job when database.replicas is exactly 2
    set:
      database.replicas: 2
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Job

  - it: should apply database tolerations to the replication job when set
    set:
      database.replicas: 3
      database.tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "mongodb"
          effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: dedicated
      - equal:
          path: spec.template.spec.tolerations[0].effect
          value: NoSchedule

  - it: should not render a Job when database.replicas is not set (defaults to 1)
    set:
      database.replicas: 1
    asserts:
      - hasDocuments:
          count: 0

  - it: should reference ROOT_USERNAME and ROOT_PASSWORD env vars
    set:
      database.replicas: 3
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ROOT_USERNAME
            valueFrom:
              secretKeyRef:
                name: release-name-database-root-credentials
                key: rootUsername
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: release-name-database-root-credentials
                key: rootPassword
