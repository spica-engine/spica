name: Spica Master Deployment

env:
  VERSION: master
  NX_FORCE_NO_DAEMON: true
  PLATFORMS: linux/amd64,linux/arm64

on:
  push:
    branches: ["master"]

jobs:
  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Free up some space on disk
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Restore Node Modules Cache
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-${{ hashFiles('**/yarn.lock') }}
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Disable Nx Cloud
        run: echo "NX_NO_CLOUD=true" >> $GITHUB_ENV

      - name: Restore Nx Cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-cache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            nx-cache-${{ runner.os }}-

      - name: Disable source maps for CI
        run: |
          node << 'EOF'
          const fs = require('fs');
          const cfg = JSON.parse(fs.readFileSync('tsconfig.json', 'utf-8'));
          cfg.compilerOptions.sourceMap = false;
          fs.writeFileSync('tsconfig.json', JSON.stringify(cfg, null, 2));
          EOF

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: godfather
          location: us-central1-a
          project_id: spica-239113

      - name: Kubectl tool installer
        uses: Azure/setup-kubectl@v4.0.0

      - name: Build API
        run: yarn run build:api

      - name: Publish API image
        run: yarn run publish:api

      - name: Deploy to GKE
        run: |
          kubectl apply -f ./deployment.yaml
          kubectl delete --all pods -n infrastructure-master-spicaengine-com
