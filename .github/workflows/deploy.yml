name: Spica Master Deployment

env:
  VERSION: master

on:
  push:
    branches: ["master"]

jobs:
  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Cache Docker cache mounts
        uses: actions/cache@v4
        id: cache
        with:
          path: docker-cache-mounts
          key: ${{ runner.os }}-docker-cache-api-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-docker-cache-api-

      - name: Inject Docker cache mounts
        uses: reproducible-containers/buildkit-cache-dance@1b8ab18fbda5ad3646e3fcc9ed9dd41ce2f297b4 # v3.3.2
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-dir: docker-cache-mounts
          dockerfile: apps/api/Dockerfile
          skip-extraction: ${{ steps.cache.outputs.cache-hit }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: spicaengine/api:${{ env.VERSION }}
          target: runner
          platforms: linux/amd64, linux/arm64
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: godfather
          location: us-central1-a
          project_id: spica-239113

      - name: Kubectl tool installer
        uses: Azure/setup-kubectl@v4.0.0

      - name: Deploy to GKE
        run: |
          kubectl apply -f ./deployment.yaml
          kubectl delete --all pods -n infrastructure-master-spicaengine-com
